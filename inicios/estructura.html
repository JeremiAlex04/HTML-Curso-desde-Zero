<!--ESTRUCTURA BASE -  HTML-->
<!DOCTYPE html> <!--DEFINE QUE ESTANDAR DE DOCUMENTO ESTAMOS SIGUIENDO (EN ESTE CASO HTML)-->
<html lang="en"> <!-- ESTABLECIENDO EL IDIOMA QUE VA A SEGUIR EL DOCUMENTO (EN ESTE CASO INGLES)-->

<!-- head: Datos que le pasamos al navegador con informacion a nuestra pagina web-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--  title: Nombre de la pagina web (El nombre de la pagina se muestra en el la pestaña del navegador)-->
    <title>Document</title>
</head>

<!-- body: Representa todo el contenido de la pagina web -->
<body>
    Body de nuestra pagina web en un servidor local
</body>
</html>
